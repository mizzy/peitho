{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ config.title }}{% endblock title %}

{% block content %}
  <article class="doc-page example-page">
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="lead">{{ page.description }}</p>
      {% endif %}
    </header>

    {{ page.content | safe }}
  </article>
{% endblock content %}
