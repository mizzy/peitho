<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Peitho OGP</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #000;
      font-family: "Iowan Old Style", "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .card {
      width: 1200px;
      height: 630px;
      padding: 88px 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
      border: 1px solid #000;
    }
    .eyebrow {
      font-size: 28px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
    }
    .title {
      font-size: 168px;
      line-height: 1;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .lead {
      font-size: 40px;
      line-height: 1.35;
      max-width: 900px;
      margin: 32px 0 0;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
    }
    .rule {
      width: 96px;
      height: 1px;
      background: #000;
      margin: 24px 0 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div>
      <div class="eyebrow">Peitho</div>
      <div class="rule"></div>
    </div>
    <div>
      <h1 class="title">Peitho</h1>
      <p class="lead">An HTML-native presentation tool that treats Markdown as the source of truth.</p>
    </div>
    <div class="footer">
      <span>peitho.gosu.ke</span>
      <span>github.com/mizzy/peitho</span>
    </div>
  </div>
</body>
</html>
