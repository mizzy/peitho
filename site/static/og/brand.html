<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Peitho OGP</title>
  <style>
    :root {
      --ink: #111111;
      --paper: #FFFFFF;
      --hair: #111111;
      --dim: #6b6b66;
      --accent: #111111;
      --chip-bg: #f4f4f2;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #e6e5e0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: var(--paper);
      color: var(--ink);
      box-sizing: border-box;
      padding: 72px 88px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr auto;
      column-gap: 64px;
      row-gap: 48px;
      font-family: "Iowan Old Style", "Hoefler Text", "Charter", Georgia, "Hiragino Mincho ProN", "Yu Mincho", serif;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid var(--hair);
      pointer-events: none;
    }
    .eyebrow {
      grid-column: 1 / 2;
      grid-row: 1 / 2;
      font-family: ui-monospace, "SFMono-Regular", "Menlo", "Consolas", monospace;
      font-size: 20px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .eyebrow-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 999px;
    }
    .headline {
      grid-column: 1 / 2;
      grid-row: 2 / 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }
    .wordmark {
      font-size: 148px;
      line-height: 0.9;
      letter-spacing: -0.03em;
      font-weight: 500;
      margin: 0;
    }
    .tagline {
      font-size: 30px;
      line-height: 1.35;
      max-width: 460px;
      color: var(--dim);
      margin: 0;
    }
    .diagram {
      grid-column: 2 / 3;
      grid-row: 1 / 3;
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: center;
      justify-items: center;
      row-gap: 20px;
      font-family: ui-monospace, "SFMono-Regular", "Menlo", "Consolas", monospace;
      font-size: 22px;
      line-height: 1.4;
      color: var(--ink);
    }
    .chip {
      border: 1px solid var(--ink);
      padding: 18px 24px;
      background: var(--chip-bg);
      white-space: nowrap;
    }
    .chip .kw {
      color: var(--accent);
    }
    .arrow {
      font-family: ui-monospace, "SFMono-Regular", "Menlo", "Consolas", monospace;
      font-size: 20px;
      color: var(--dim);
    }
    .verdict {
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
    }
    .verdict .tag {
      font-size: 16px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--paper);
      border: 1px solid var(--paper);
      padding: 2px 10px;
    }
    .footer {
      grid-column: 1 / 3;
      grid-row: 3 / 4;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: ui-monospace, "SFMono-Regular", "Menlo", "Consolas", monospace;
      font-size: 20px;
      letter-spacing: 0.06em;
      color: var(--dim);
      border-top: 1px solid var(--hair);
      padding-top: 28px;
    }
    .footer .url {
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">
      <span class="eyebrow-dot"></span>
      <span>HTML-native presentations</span>
    </div>

    <div class="headline">
      <h1 class="wordmark">Peitho</h1>
      <p class="tagline">Layouts as types. Broken decks fail at build, not on stage.</p>
    </div>

    <div class="diagram" aria-hidden="true">
      <div class="chip">
        <span class="kw">&lt;slot</span> name="code" accepts="code"<span class="kw">/&gt;</span>
      </div>
      <div class="arrow">&darr; type-check</div>
      <div class="verdict">
        <span class="tag">error</span>
        <span>slide 3: unknown slot "cdoe"</span>
      </div>
    </div>

    <div class="footer">
      <span class="url">peitho.gosu.ke</span>
      <span>github.com/mizzy/peitho</span>
    </div>
  </div>
</body>
</html>
