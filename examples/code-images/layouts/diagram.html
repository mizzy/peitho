<section class="code-images code-images-diagram">
  <div class="copy-pane">
    <p class="eyebrow">code_images</p>
    <h1><slot name="title" accepts="inline" arity="1"></slot></h1>
    <div class="body-copy">
      <slot name="body" accepts="blocks" arity="0..*"></slot>
    </div>
  </div>
  <figure class="diagram-pane">
    <slot name="image" accepts="image" arity="1"></slot>
  </figure>
</section>
