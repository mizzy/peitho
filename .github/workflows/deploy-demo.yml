name: Deploy Demo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # PR runはPR番号でgroup化してdemo-preview-cleanup.ymlと同じgroupにし、それ以外はrefでgroup化する
  group: deploy-demo-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: demo

      - name: Install Zola
        env:
          ZOLA_VERSION: 0.22.1
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/zola.tar.gz
          tar -xzf /tmp/zola.tar.gz -C /tmp
          sudo install -m 0755 /tmp/zola /usr/local/bin/zola
          zola --version

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Playwright chromium
        run: |
          set -euo pipefail
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install --no-save --no-package-lock playwright@latest
          npx playwright@latest install --with-deps chromium

      - name: Install diagram renderers
        run: |
          set -euo pipefail
          # The code-images demo deck shells out to Graphviz (dot); Mermaid is built into peitho.
          sudo apt-get update
          sudo apt-get install -y graphviz
          dot -V

      # このリポジトリ自身がpeithoなので、リリースバイナリではなく
      # ソースからビルドした今のpeithoでデモサイトを組む
      - name: Build demo site
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            alias=$(echo "$HEAD_REF" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-28 | sed 's/^-*//; s/-*$//')
            base_url="https://${alias}.peitho-4yr.pages.dev"
            make demo-site ZOLA_BASE_URL="$base_url" && make demo-screenshots ZOLA_BASE_URL="$base_url" && make og-cards ZOLA_BASE_URL="$base_url"
          else
            make demo-site && make demo-screenshots && make og-cards
          fi

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .demo-site --project-name=peitho --branch=main

      # fork PRはSecretsを参照できないため、同一リポジトリからのPRのみプレビューをデプロイする
      - name: Deploy preview to Cloudflare Pages
        id: preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .demo-site --project-name=peitho --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        if: steps.preview.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ALIAS_URL: ${{ steps.preview.outputs.pages-deployment-alias-url }}
          DEPLOYMENT_URL: ${{ steps.preview.outputs.deployment-url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          marker="<!-- peitho-demo-preview-url -->"
          body="$(printf '%s\n' \
            "🔍 **Demo preview**: ${ALIAS_URL:-$DEPLOYMENT_URL}" \
            "" \
            "| | URL |" \
            "|---|---|" \
            "| Branch alias | ${ALIAS_URL:-–} |" \
            "| This deploy | ${DEPLOYMENT_URL:-–} |" \
            "" \
            "commit: ${HEAD_SHA}" \
            "${marker}")"
          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n1)"
          if [ -n "${comment_id}" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="${body}" >/dev/null
          else
            gh pr comment "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body "${body}"
          fi
