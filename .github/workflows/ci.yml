name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/peitho-present/package-lock.json
      - run: npm ci
        working-directory: packages/peitho-present
      - run: npm run build
        working-directory: packages/peitho-present
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests
      - run: cargo test --workspace
      - run: git diff --exit-code bindings/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo fmt --all --check

  e2e:
    runs-on: ubuntu-latest
    env:
      PEITHO_CHROME_PATH: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests
      - run: google-chrome --version
      - run: cargo test --workspace -- --ignored --test-threads=1

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/peitho-present
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/peitho-present/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: git diff --exit-code dist/shell.js
      - run: npm test
      - run: npm run typecheck
